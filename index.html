<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LeadStream Pro — Skill Up TechBuzz</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Inter:wght@400;500;600;700;800&display=swap');

:root{
  --bg:#080a0f;--bg2:#0d1018;--bg3:#0f1117;--bg4:#12161f;
  --border:#1a2030;--border2:#1e2433;
  --text:#e8eaf0;--text2:#9aa0b0;--text3:#6b7888;--text4:#4a5568;
  --card:linear-gradient(135deg,#0f1117,#131720);--inp:#12161f;
  --shadow:0 2px 12px rgba(0,0,0,0.5);--accent:#f97316;--accent2:#1d4ed8;
}
[data-theme="light"]{
  --bg:#f0f4f8;--bg2:#e8edf5;--bg3:#ffffff;--bg4:#f5f7fb;
  --border:#d1dce9;--border2:#c0cce0;
  --text:#111827;--text2:#374151;--text3:#4b5563;--text4:#6b7280;
  --card:linear-gradient(135deg,#ffffff,#f5f7fb);--inp:#ffffff;
  --shadow:0 2px 12px rgba(0,0,0,0.08);
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;font-size:14px}
body,.header,.search-box,.toolbar,.stats,.lead-card,input,select,.btn-filter{
  transition:background 0.25s,color 0.2s,border-color 0.2s;
}

/* ===== HEADER ===== */
.header{background:var(--bg3);border-bottom:1px solid var(--border2);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:var(--shadow)}
.logo{display:flex;align-items:center;gap:10px}
.logo-img{width:38px;height:38px;border-radius:9px;object-fit:contain;flex-shrink:0;background:#fff;padding:2px}
.logo-text{font-size:15px;font-weight:800;letter-spacing:.04em;color:var(--text);font-family:'Space Mono',monospace}
.logo-text span{color:var(--accent)}
.logo-sub{font-size:8px;color:var(--text4);letter-spacing:.12em;margin-top:1px;font-family:'Space Mono',monospace}
.header-right{display:flex;align-items:center;gap:10px}
.live-badge{display:flex;align-items:center;gap:5px;background:var(--bg4);border:1px solid var(--border2);border-radius:20px;padding:5px 10px;font-size:10px;color:var(--accent);white-space:nowrap}
.dot{width:7px;height:7px;border-radius:50%;background:var(--accent);box-shadow:0 0 6px var(--accent);animation:pulse 1.5s infinite;flex-shrink:0}
/* Theme toggle - sun visible in dark, moon visible in light */
.theme-btn{width:56px;height:30px;border-radius:15px;border:none;cursor:pointer;position:relative;flex-shrink:0;background:#1e2a40;transition:background 0.3s}
[data-theme="light"] .theme-btn{background:#c8d8f0}
.theme-btn::after{content:'';position:absolute;top:3px;left:3px;width:24px;height:24px;border-radius:50%;background:#fff;transition:transform 0.3s;box-shadow:0 1px 4px rgba(0,0,0,0.3)}
[data-theme="light"] .theme-btn::after{transform:translateX(26px)}
.t-icon{position:absolute;top:50%;transform:translateY(-50%);font-size:14px;pointer-events:none;line-height:1;transition:opacity 0.2s}
/* Dark mode: sun on left (toggle to light), moon hidden */
.t-sun{left:5px}
.t-moon{right:5px}
[data-theme="dark"] .t-moon{opacity:0}
[data-theme="dark"] .t-sun{opacity:1}
/* Light mode: moon on right (toggle to dark), sun hidden */
[data-theme="light"] .t-sun{opacity:0}
[data-theme="light"] .t-moon{opacity:1}

/* ===== SEARCH BOX ===== */
.search-box{background:var(--bg2);border-bottom:1px solid var(--border);padding:18px 16px}
.s-label{font-size:10px;color:var(--text3);letter-spacing:.14em;margin-bottom:14px;text-align:center;font-family:'Space Mono',monospace;display:flex;align-items:center;justify-content:center;gap:8px}
.s-label .lens-wrap{position:relative;width:22px;height:22px;flex-shrink:0}
.s-label .lens-icon{font-size:18px;position:absolute;top:0;left:0;transition:opacity 0.3s}
.s-label .lens-searching{position:absolute;top:0;left:0;opacity:0;transition:opacity 0.3s}
.s-label.is-searching .lens-icon{opacity:0}
.s-label.is-searching .lens-searching{opacity:1}

/* Lens searching animation */
@keyframes lens-scan{
  0%{transform:rotate(0deg) scale(1);}
  25%{transform:rotate(-15deg) scale(1.15);}
  50%{transform:rotate(10deg) scale(0.9);}
  75%{transform:rotate(-8deg) scale(1.1);}
  100%{transform:rotate(0deg) scale(1);}
}
@keyframes lens-glow{
  0%,100%{filter:drop-shadow(0 0 3px var(--accent));}
  50%{filter:drop-shadow(0 0 10px var(--accent)) drop-shadow(0 0 20px var(--accent2));}
}
.lens-searching{animation:lens-scan 0.8s ease-in-out infinite, lens-glow 1.2s ease-in-out infinite}

.inputs{display:flex;flex-direction:column;gap:10px;align-items:stretch;width:100%}
.ig{width:100%;flex:none}
.ig label{display:block;font-size:9px;color:var(--text3);letter-spacing:.1em;margin-bottom:5px;font-weight:600;font-family:'Space Mono',monospace}
input,select{width:100%;background:var(--inp);border:1px solid var(--border2);border-radius:10px;padding:10px 14px;color:var(--text);font-family:'Inter',sans-serif;font-size:13px;font-weight:500;outline:none;transition:border-color 0.2s,box-shadow 0.2s}
input:focus,select:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(249,115,22,0.12)}
[data-theme="light"] input,[data-theme="light"] select{border-color:var(--border)}
select option{background:var(--inp);color:var(--text)}
.btn-search{background:linear-gradient(135deg,#f97316,#ea580c);border:none;border-radius:10px;padding:13px 26px;color:#ffffff;font-family:'Space Mono',monospace;font-size:13px;font-weight:700;cursor:pointer;letter-spacing:.08em;white-space:nowrap;transition:transform 0.15s,box-shadow 0.2s;width:100%}
.btn-search:hover{transform:translateY(-1px);box-shadow:0 4px 20px rgba(249,115,22,.35)}
.btn-search:active{transform:translateY(0)}
.btn-search:disabled{background:var(--border);color:var(--text4);cursor:not-allowed;transform:none;box-shadow:none}
.errmsg{margin-top:10px;color:#ff6666;font-size:11px;font-weight:600}
[data-theme="light"] .errmsg{color:#c62828}
.dbg{margin-top:8px;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:8px;font-size:9px;color:var(--text4);word-break:break-all;line-height:1.5;max-height:90px;overflow-y:auto;font-family:'Space Mono',monospace}

/* ===== CITY AUTOCOMPLETE ===== */
.city-wrap{position:relative;width:100%}
.city-drop{position:absolute;top:calc(100% + 4px);left:0;right:0;background:#0d1018;border:1px solid var(--accent);border-radius:10px;z-index:200;max-height:220px;overflow-y:auto;display:none;box-shadow:0 8px 24px rgba(0,0,0,0.5)}
[data-theme="light"] .city-drop{background:#fff;border-color:var(--accent);box-shadow:0 8px 24px rgba(0,0,0,0.15)}
.city-drop.open{display:block}
.city-item{padding:10px 14px;font-size:13px;color:var(--text2);cursor:pointer;border-bottom:1px solid var(--border);transition:background 0.15s;font-family:'Inter',sans-serif;font-weight:500}
.city-item:last-child{border-bottom:none}
.city-item:hover,.city-item.active{background:rgba(249,115,22,0.1);color:var(--accent)}
.city-item .city-state{font-size:10px;color:var(--text4);margin-left:6px;font-family:'Space Mono',monospace}


.stats{display:flex;background:var(--bg2);border-bottom:1px solid var(--border);overflow-x:auto}
.stat{flex:1 1 55px;min-width:55px;padding:10px 6px;border-right:1px solid var(--border);text-align:center}
.stat-val{font-size:18px;font-weight:800;font-family:'Space Mono',monospace}
.stat-label{font-size:8px;color:var(--text4);letter-spacing:.1em;margin-top:2px;font-family:'Space Mono',monospace}

/* ===== TOOLBAR ===== */
.toolbar{padding:12px 20px;border-bottom:1px solid var(--border);display:flex;flex-direction:column;gap:10px;background:var(--bg2)}
.tb-row1{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.btn-score{background:#ff440012;border:1px solid #ff440040;color:#ff6666;border-radius:8px;padding:7px 16px;font-family:'Space Mono',monospace;font-size:10px;font-weight:700;cursor:pointer;letter-spacing:.06em;transition:background 0.2s}
.btn-score:hover{background:#ff440025}
.btn-pdf{background:#aa88ff12;border:1px solid #aa88ff40;color:#aa88ff;border-radius:8px;padding:7px 16px;font-family:'Space Mono',monospace;font-size:10px;font-weight:700;cursor:pointer;letter-spacing:.06em;transition:background 0.2s}
.btn-pdf:hover{background:#aa88ff25}
.btn-pdf:disabled{opacity:.4;cursor:not-allowed}
.btn-whatsapp{background:#25d366;border:none;color:#fff;border-radius:8px;padding:8px 14px;font-family:'Space Mono',monospace;font-size:10px;font-weight:700;cursor:pointer;letter-spacing:.06em;transition:all 0.2s;display:flex;align-items:center;gap:6px;white-space:nowrap}
.btn-whatsapp:hover{background:#20ba5c;transform:scale(1.05);box-shadow:0 4px 12px rgba(37,211,102,0.3)}
.btn-whatsapp:active{transform:scale(0.98)}
.unscored-txt{font-size:10px;color:var(--text4);font-family:'Space Mono',monospace}
.filter-row{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.f-label{font-size:9px;color:var(--text4);letter-spacing:.1em;white-space:nowrap;font-family:'Space Mono',monospace}
.f-group{display:flex;gap:4px;flex-wrap:wrap}
.btn-filter{border-radius:20px;padding:5px 14px;font-size:10px;font-family:'Space Mono',monospace;font-weight:700;cursor:pointer;letter-spacing:.04em;border:1px solid var(--border2);background:var(--bg4);color:var(--text3);transition:all .2s;white-space:nowrap}
[data-theme="light"] .btn-filter{background:#fff;border-color:var(--border);color:var(--text3)}
.btn-filter:hover{color:var(--text2);border-color:var(--accent)}
.btn-filter.a-all{background:#f9731615;border-color:var(--accent);color:var(--accent)}
.btn-filter.a-web{background:#aa88ff15;border-color:#aa88ff80;color:#aa88ff}
.btn-filter.a-noweb{background:#ff444415;border-color:#ff444460;color:#ff7777}
.btn-filter.a-mob{background:#1d4ed815;border-color:#1d4ed860;color:#1d4ed8}
.btn-filter.a-nomob{background:#ff990015;border-color:#ff990060;color:#ff9900}
[data-theme="light"] .btn-filter.a-all{background:#d4edda;border-color:#28a745;color:#155724}
[data-theme="light"] .btn-filter.a-web{background:#e7d9f5;border-color:#7c3aed;color:#5b21b6}
[data-theme="light"] .btn-filter.a-noweb{background:#ffcdd2;border-color:#f44336;color:#c62828}
[data-theme="light"] .btn-filter.a-mob{background:#b3e5fc;border-color:#0288d1;color:#01579b}
[data-theme="light"] .btn-filter.a-nomob{background:#ffe0b2;border-color:#ff9800;color:#e65100}
.f-div{width:1px;background:var(--border2);height:22px;margin:0 2px;align-self:center}
.f-count{font-size:9px;color:var(--text4);margin-left:4px;font-weight:700;font-family:'Space Mono',monospace}
.f-grp-wrap{display:flex;flex-direction:column;gap:3px}
.f-grp-label{font-size:8px;color:var(--text4);letter-spacing:.1em;font-family:'Space Mono',monospace}

/* ===== LEADS ===== */
.leads{padding:14px 20px 32px;display:flex;flex-direction:column;gap:10px}
.lead-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:15px 17px;display:flex;align-items:flex-start;gap:12px;flex-wrap:wrap;transition:border-color .3s,box-shadow .2s,transform 0.2s;
  animation:cardIn 0.35s ease both}
@keyframes cardIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.lead-card:hover{box-shadow:var(--shadow);transform:translateY(-1px)}

.avatar{width:44px;height:44px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;font-family:'Space Mono',monospace}
.lead-info{flex:2 1 160px}

/* BIGGER BOLDER TEXT for name/address/phone */
.lead-name{font-weight:800;font-size:16px;color:var(--text);line-height:1.2;letter-spacing:-0.01em}
.lead-detail{font-size:13px;color:var(--text2);margin-top:5px;line-height:1.5;font-weight:500}
[data-theme="light"] .lead-detail{color:var(--text2)}
.lead-detail.phone-detail{font-size:14px;font-weight:700;letter-spacing:0.01em}
.lead-detail.address-detail{font-size:13px;font-weight:500}
.lead-website{font-size:12px;color:var(--accent2);margin-top:5px;text-decoration:none;display:block;word-break:break-all;font-weight:600}
.lead-tags{flex:1 1 100px;display:flex;flex-wrap:wrap;gap:5px;align-items:flex-start}
.lead-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap;min-width:200px}
.tag{border-radius:6px;padding:4px 10px;font-size:10px;font-weight:700;font-family:'Space Mono',monospace;letter-spacing:.03em}
.tag-rate{background:#1a2a1a;color:#66bb66;border:1px solid #66bb6622}
.tag-noweb{background:#2a1414;color:#ff7777;border:1px solid #ff444422}
.tag-nomob{background:#2a1e10;color:#ff9900;border:1px solid #ff990022}
[data-theme="light"] .tag-rate{background:#c8f0d8;color:#1b5e20;border-color:#66bb6a}
[data-theme="light"] .tag-noweb{background:#fce0e6;color:#c62828;border-color:#f44336}
[data-theme="light"] .tag-nomob{background:#ffefd5;color:#d84315;border-color:#ff9800}
.lead-score{flex-shrink:0;min-width:90px;text-align:right}
.score-badge{border-radius:20px;padding:5px 13px;font-size:11px;font-weight:800;letter-spacing:.06em;font-family:'Space Mono',monospace}
.score-reason{font-size:9px;color:var(--text4);margin-top:5px;max-width:140px;line-height:1.6}
.btn-ai{border-radius:8px;padding:7px 13px;font-size:10px;cursor:pointer;font-family:'Space Mono',monospace;font-weight:700;background:#f9731612;border:1px solid #f9731644;color:var(--accent);transition:background 0.2s}
.btn-ai:hover{background:#f9731625}
.btn-whatsapp{background:#25d366;border:none;color:#fff;border-radius:8px;padding:8px 14px;font-family:'Space Mono',monospace;font-size:11px;font-weight:700;cursor:pointer;letter-spacing:.06em;transition:all 0.2s;display:flex;align-items:center;gap:6px;white-space:nowrap}
.btn-whatsapp:hover{background:#20ba5c;transform:scale(1.05);box-shadow:0 4px 12px rgba(37,211,102,0.4)}
.btn-whatsapp:active{transform:scale(0.98)}
.btn-capture{background:#ff9500;border:none;color:#fff;border-radius:8px;padding:8px 14px;font-family:'Space Mono',monospace;font-size:11px;font-weight:700;cursor:pointer;letter-spacing:.06em;transition:all 0.2s;display:flex;align-items:center;gap:6px;white-space:nowrap}
.btn-capture:hover{background:#e68a00;transform:scale(1.05);box-shadow:0 4px 12px rgba(255,149,0,0.4)}
.btn-capture:active{transform:scale(0.98)}

/* ===== EMPTY STATE ===== */
.empty{text-align:center;padding:60px 20px}
.empty-icon{font-size:44px;margin-bottom:14px}
.empty-text{font-size:15px;color:var(--text3);font-weight:700;font-family:'Space Mono',monospace}
.empty-sub{font-size:11px;color:var(--text4);margin-top:6px}

/* ===== LOADING ===== */
.loading{text-align:center;padding:60px 20px}
.load-text{font-size:13px;color:var(--text3);margin-top:14px;line-height:1.8;font-family:'Space Mono',monospace}

/* Magnifying glass lens loader */
.lens-loader{position:relative;width:64px;height:64px;margin:0 auto}
.lens-circle{width:44px;height:44px;border-radius:50%;border:3px solid transparent;border-top-color:var(--accent);border-right-color:var(--accent2);animation:lensRotate 1s linear infinite;position:absolute;top:0;left:0}
.lens-circle2{width:34px;height:34px;border-radius:50%;border:2px solid transparent;border-bottom-color:rgba(249,115,22,0.4);animation:lensRotate 0.7s linear infinite reverse;position:absolute;top:5px;left:5px}
.lens-handle{width:3px;height:16px;background:linear-gradient(var(--accent),var(--accent2));border-radius:2px;position:absolute;bottom:0;right:8px;transform:rotate(45deg);transform-origin:top center;animation:lensRotate 1s linear infinite}
.lens-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);animation:pulse 1s ease-in-out infinite}
@keyframes lensRotate{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

/* ===== RESPONSIVE ===== */
@media(max-width:768px){
  .header{padding:10px 12px}
  .logo-text{font-size:13px}
  .search-box{padding:14px 14px}
  .inputs{flex-direction:column;align-items:stretch}
  .ig{width:100%}
  .btn-search{width:100%;margin-top:2px}
  .stat{min-width:45px;padding:8px 4px}
  .stat-val{font-size:15px}
  .toolbar{padding:8px 12px}
  .leads{padding:8px 12px 24px;gap:8px}
  .lead-card{padding:12px 13px;gap:10px}
  .lead-name{font-size:14px}
  .lead-detail{font-size:12px}
  .lead-score{min-width:75px}
  .empty{padding:40px 12px}
}
@media(min-width:769px){
  .inputs{flex-direction:row;flex-wrap:nowrap;align-items:flex-end}
  .ig{flex:1 1 auto;width:auto}
  .btn-search{width:auto}
}
@media(min-width:1024px){
  .leads{padding:16px 28px 32px}
  .btn-search:hover{box-shadow:0 4px 20px rgba(249,115,22,.35)}
}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* Card stagger animation delays */
.lead-card:nth-child(1){animation-delay:0.02s}
.lead-card:nth-child(2){animation-delay:0.05s}
.lead-card:nth-child(3){animation-delay:0.08s}
.lead-card:nth-child(4){animation-delay:0.11s}
.lead-card:nth-child(5){animation-delay:0.14s}
.lead-card:nth-child(6){animation-delay:0.17s}
.lead-card:nth-child(7){animation-delay:0.20s}
.lead-card:nth-child(8){animation-delay:0.23s}
.lead-card:nth-child(9){animation-delay:0.26s}
.lead-card:nth-child(10){animation-delay:0.29s}
</style>
</head>
<body>

<script>
function toggleTheme(){
  const h=document.documentElement;
  h.setAttribute('data-theme',h.getAttribute('data-theme')==='dark'?'light':'dark');
}

const SERPER_KEY="13149ce3b00b52577cee66c22feef4c708470263";
const SC={Hot:"#ff4444",Warm:"#ff9900",Cold:"#4488ff"};
let leads=[],fWeb=null,fMob=null;

function hBg(id){return`hsl(${(id*53)%360},55%,25%)`}
function hFg(id){return`hsl(${(id*53)%360},80%,75%)`}
function hasMob(l){const p=l.phone;return p&&p!=="Not listed"&&p.trim()!==""}
function hasWeb(l){return!!l.website}

function getFiltered(){
  return leads.filter(l=>{
    if(fWeb===true&&!hasWeb(l))return false;
    if(fWeb===false&&hasWeb(l))return false;
    if(fMob===true&&!hasMob(l))return false;
    if(fMob===false&&hasMob(l))return false;
    return true;
  });
}

function toggleFilter(f){
  if(f==='web')fWeb=fWeb===true?null:true;
  else if(f==='noweb')fWeb=fWeb===false?null:false;
  else if(f==='mob')fMob=fMob===true?null:true;
  else if(f==='nomob')fMob=fMob===false?null:false;
  syncBtns();renderLeads();
}
function resetFilters(){fWeb=null;fMob=null;syncBtns();renderLeads();}
function syncBtns(){
  const isAll=fWeb===null&&fMob===null;
  document.getElementById('f-all').className='btn-filter'+(isAll?' a-all':'');
  document.getElementById('f-web').className='btn-filter'+(fWeb===true?' a-web':'');
  document.getElementById('f-noweb').className='btn-filter'+(fWeb===false?' a-noweb':'');
  document.getElementById('f-mob').className='btn-filter'+(fMob===true?' a-mob':'');
  document.getElementById('f-nomob').className='btn-filter'+(fMob===false?' a-nomob':'');
}

async function searchBusinesses(){
  const city=document.getElementById('cityInput').value.trim();
  const custom=document.getElementById('customInput').value.trim();
  const type=custom||document.getElementById('typeSelect').value;
  if(!city){showErr("Please enter a city name.");return;}

  // Find areas for this city (district-wide search)
  let cityObj = CITY_INDEX.find(c=>c.display.toLowerCase()===city.toLowerCase());
  // If user typed but didn't select from dropdown, try to match
  if(!cityObj && selectedAreas){
    cityObj = {display:city, areas:selectedAreas};
  }
  if(!cityObj){
    cityObj = CITY_INDEX.find(c=>c.display.toLowerCase().includes(city.toLowerCase()));
  }
  const searchAreas = cityObj ? cityObj.areas : [city];

  const btn=document.getElementById('searchBtn');
  const label=document.getElementById('searchLabel');
  btn.disabled=true;btn.textContent="SEARCHING...";
  label.classList.add('is-searching');
  document.getElementById('errMsg').style.display="none";
  document.getElementById('dbgBox').style.display="none";
  document.getElementById('statsBar').style.display="none";
  document.getElementById('toolbar').style.display="none";
  document.getElementById('leadsContainer').innerHTML=
    `<div class="loading">
      <div class="lens-loader">
        <div class="lens-circle"></div>
        <div class="lens-circle2"></div>
        <div class="lens-handle"></div>
        <div class="lens-dot"></div>
      </div>
      <div class="load-text">Fetching from Google Maps (up to 200 leads)...<br>Searching entire ${city} district. Please wait.</div>
    </div>`;
  leads=[];fWeb=null;fMob=null;

  try{
    // Pick up to 5 diverse areas from district for better coverage
    const areaSlice = searchAreas.length > 10
      ? [searchAreas[0], searchAreas[Math.floor(searchAreas.length*0.1)], searchAreas[Math.floor(searchAreas.length*0.2)], searchAreas[Math.floor(searchAreas.length*0.3)], searchAreas[Math.floor(searchAreas.length*0.4)], searchAreas[Math.floor(searchAreas.length*0.5)], searchAreas[Math.floor(searchAreas.length*0.6)], searchAreas[Math.floor(searchAreas.length*0.7)], searchAreas[Math.floor(searchAreas.length*0.8)], searchAreas[searchAreas.length-1]]
      : searchAreas.slice(0,10);

    const calls = areaSlice.map(area=>
      fetch("https://google.serper.dev/maps",{
        method:"POST",
        headers:{"X-API-KEY":SERPER_KEY,"Content-Type":"application/json"},
        body:JSON.stringify({q:`${type} in ${area} ${city} India`,gl:"in",hl:"en",num:100})
      }).then(r=>r.json()).catch(()=>({places:[]}))
    );
    const results=await Promise.all(calls);
    const seen=new Set(),merged=[];
    for(const d of results){
      for(const p of(d.places||d.results||[])){
        const k=(p.title||p.name||"")+(p.address||"");
        if(!seen.has(k)){seen.add(k);merged.push(p);}
      }
    }
    const dbg=document.getElementById('dbgBox');
    dbg.textContent="Found "+merged.length+" unique businesses across "+areaSlice.length+" areas in "+city;
    dbg.style.display="block";

    if(merged.length>0){
      leads=merged.slice(0,200).map((p,i)=>({
        id:i+1,
        name:p.title||p.name||"Unknown",
        address:p.address||p.vicinity||"N/A",
        phone:p.phoneNumber||p.phone||"Not listed",
        website:p.website||null,
        rating:p.rating||null,
        reviews:p.ratingCount||p.reviews||0,
        category:p.category||p.type||"",
        scoreLabel:null,scoreColor:null,reason:null,scoring:false,
      }));
      syncBtns();renderLeads();
    }else{
      showErr("No businesses found. Try a different city or business type.");
      document.getElementById('leadsContainer').innerHTML=
        '<div class="empty"><div class="empty-icon">😥</div><div class="empty-text">No results found</div><div class="empty-sub">Try another city or type</div></div>';
    }
  }catch(e){
    showErr("Connection error: "+e.message);
    document.getElementById('leadsContainer').innerHTML=
      '<div class="empty"><div class="empty-icon">❌</div><div class="empty-text">Connection error</div></div>';
  }
  btn.disabled=false;btn.textContent="SEARCH";
  label.classList.remove('is-searching');
}

function renderLeads(){
  const filtered=getFiltered();
  const isF=fWeb!==null||fMob!==null;
  document.getElementById('fCount').textContent=
    isF?(filtered.length+" of "+leads.length+" leads"):(leads.length+" leads");

  if(filtered.length===0){
    document.getElementById('leadsContainer').innerHTML=
      '<div class="empty"><div class="empty-icon">🔍</div><div class="empty-text">No leads match this filter</div><div class="empty-sub">Try another filter combination</div></div>';
    document.getElementById('statsBar').style.display="flex";
    document.getElementById('toolbar').style.display="flex";
    updateStats();return;
  }

  document.getElementById('leadsContainer').innerHTML=filtered.map(lead=>`
    <div class="lead-card" id="card-${lead.id}" style="border-color:${lead.scoreColor?lead.scoreColor+'55':'var(--border)'}">
      <div class="avatar" style="background:${hBg(lead.id)};color:${hFg(lead.id)}">${lead.name.slice(0,2).toUpperCase()}</div>
      <div class="lead-info">
        <div class="lead-name">${lead.name}</div>
        <div class="lead-detail address-detail">📍 ${lead.address}</div>
        <div class="lead-detail phone-detail" style="color:${hasMob(lead)?'var(--accent2)':'#ff9900'}">📞 ${lead.phone}</div>
        ${lead.category?`<div class="lead-detail" style="color:var(--text4);font-size:11px">🏷 ${lead.category}</div>`:''}
        ${lead.website?`<a class="lead-website" href="${lead.website}" target="_blank" rel="noopener">🌐 ${lead.website.replace(/^https?:\/\//,'').slice(0,36)}</a>`:''}
      </div>
      <div class="lead-tags">
        ${lead.rating?`<span class="tag tag-rate">⭐ ${lead.rating} (${lead.reviews})</span>`:''}
        ${!lead.website?'<span class="tag tag-noweb">No Website</span>':''}
        ${!hasMob(lead)?'<span class="tag tag-nomob">No Mobile</span>':''}
      </div>
      <div class="lead-actions">
        <button class="btn-whatsapp" onclick="shareViaWhatsApp({name:'${lead.name.replace(/'/g, "\\'")}',phone:'${lead.phone}',address:'${lead.address.replace(/'/g, "\\'")}',rating:${lead.rating||'null'},reviews:${lead.reviews||'null'}})">💬 Message</button>
        <button class="btn-capture" onclick="captureAndShare(${lead.id},this)">📸 Image</button>
        <div class="lead-score" id="score-${lead.id}">${renderScore(lead)}</div>
      </div>
    </div>
  `).join('');

  document.getElementById('statsBar').style.display="flex";
  document.getElementById('toolbar').style.display="flex";
  updateStats();
}

function renderScore(lead){
  if(lead.scoring)return'<span style="font-size:10px;color:var(--accent);font-family:\'Space Mono\',monospace">Scoring...</span>';
  if(lead.scoreLabel){
    return`<span class="score-badge" style="background:${lead.scoreColor}22;color:${lead.scoreColor};border:1px solid ${lead.scoreColor}55">${lead.scoreLabel}</span>${lead.reason?`<div class="score-reason">${lead.reason}</div>`:''}`;
  }
  return`<button class="btn-ai" onclick="scoreOne(${lead.id})">AI Score</button>`;
}

async function scoreOne(id){
  const lead=leads.find(l=>l.id===id);if(!lead)return;
  lead.scoring=true;
  const el=document.getElementById('score-'+id);
  if(el)el.innerHTML=renderScore(lead);

  try{
    const res=await fetch("https://api.anthropic.com/v1/messages",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({
        model:"claude-sonnet-4-20250514",max_tokens:150,
        messages:[{role:"user",content:
          "Score this as a B2B sales lead: Hot, Warm, or Cold.\n"+
          "Name: "+lead.name+"\n"+
          "Location: "+lead.address+"\n"+
          "Category: "+lead.category+"\n"+
          "Rating: "+(lead.rating||"N/A")+" ("+lead.reviews+" reviews)\n"+
          "Has Website: "+(lead.website?"Yes":"No")+"\n"+
          "Has Phone: "+(hasMob(lead)?"Yes":"No")+"\n"+
          "Reply ONLY with valid JSON, no markdown: {\"score\":\"Hot\",\"reason\":\"one short sentence\"}"
        }]
      })
    });
    const data=await res.json();
    const text=(data.content||[]).map(c=>c.text||"").join("");
    const parsed=JSON.parse(text.replace(/```json|```/g,"").trim());
    lead.scoring=false;lead.scoreLabel=parsed.score;
    lead.scoreColor=SC[parsed.score]||"#888";lead.reason=parsed.reason;
  }catch(err){
    lead.scoring=false;lead.scoreLabel="Error";lead.scoreColor="#888";
    lead.reason="Score failed. Check API.";
  }
  const el2=document.getElementById('score-'+id);if(el2)el2.innerHTML=renderScore(lead);
  const card=document.getElementById('card-'+id);
  if(card)card.style.borderColor=(lead.scoreColor||"var(--border)")+"55";
  updateStats();
}

async function scoreAll(){
  const unscored=getFiltered().filter(l=>!l.scoreLabel&&!l.scoring);
  for(const lead of unscored)await scoreOne(lead.id);
}

function updateStats(){
  document.getElementById('sTotal').textContent=leads.length;
  document.getElementById('sHot').textContent=leads.filter(l=>l.scoreLabel==="Hot").length;
  document.getElementById('sWarm').textContent=leads.filter(l=>l.scoreLabel==="Warm").length;
  document.getElementById('sCold').textContent=leads.filter(l=>l.scoreLabel==="Cold").length;
  document.getElementById('sWeb').textContent=leads.filter(l=>hasWeb(l)).length;
  document.getElementById('sMob').textContent=leads.filter(l=>hasMob(l)).length;
  document.getElementById('unscoredTxt').textContent=leads.filter(l=>!l.scoreLabel).length+" unscored";
}

async function exportPDF(){
  const btn=document.getElementById('pdfBtn');
  btn.disabled=true;btn.textContent="Generating...";
  try{
    const{jsPDF}=window.jspdf;
    const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
    const filtered=getFiltered();
    const city=document.getElementById('cityInput').value.trim();
    const type=document.getElementById('customInput').value.trim()||document.getElementById('typeSelect').value;
    const now=new Date().toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'});
    const W=210,M=14;let y=18;

    doc.setFillColor(255,255,255);doc.rect(0,0,W,297,'F');
    doc.setFillColor(15,20,35);doc.rect(0,0,W,32,'F');
    doc.setFont('helvetica','bold');doc.setFontSize(18);doc.setTextColor(249,115,22);
    doc.text('LEADSTREAM PRO',M,12);
    doc.setFontSize(8);doc.setTextColor(160,180,200);
    doc.text(type.toUpperCase()+" in "+city.toUpperCase()+" - "+now,M,20);
    doc.setFontSize(7);doc.setTextColor(100,130,160);
    doc.text("Total: "+leads.length+" | Shown: "+filtered.length+" | Website: "+leads.filter(l=>hasWeb(l)).length+" | Mobile: "+leads.filter(l=>hasMob(l)).length,M,27);
    y=42;

    const cX={no:M,name:M+9,phone:M+65,web:M+104,rate:M+153,sc:M+170};
    function tHead(){
      doc.setFillColor(240,245,255);doc.rect(M-2,y-4,W-M*2+4,9,'F');
      doc.setDrawColor(200,210,230);doc.line(M-2,y+5,W-M+2,y+5);
      doc.setFont('helvetica','bold');doc.setFontSize(7);doc.setTextColor(50,90,180);
      ["#","NAME","PHONE","WEBSITE","RATING","SCORE"].forEach((h,i)=>{
        doc.text(h,[cX.no,cX.name,cX.phone,cX.web,cX.rate,cX.sc][i],y);
      });
      y+=9;
    }
    tHead();

    filtered.forEach((lead,idx)=>{
      if(y>270){doc.addPage();doc.setFillColor(255,255,255);doc.rect(0,0,W,297,'F');y=18;tHead();}
      doc.setFillColor(idx%2===0?248:255,idx%2===0?250:255,255);
      doc.rect(M-2,y-3.5,W-M*2+4,8.5,'F');
      doc.setFontSize(7);
      doc.setFont('helvetica','normal');doc.setTextColor(120,140,160);
      doc.text(String(idx+1),cX.no,y);
      doc.setFont('helvetica','bold');doc.setTextColor(20,30,50);
      const nm=lead.name.length>32?lead.name.slice(0,31)+"...":lead.name;
      doc.text(nm,cX.name,y);
      doc.setFont('helvetica','normal');
      if(hasMob(lead)){doc.setTextColor(30,120,80);doc.text(lead.phone.slice(0,17),cX.phone,y);}
      else{doc.setTextColor(180,40,40);doc.text('No Mobile',cX.phone,y);}
      if(hasWeb(lead)){doc.setTextColor(0,100,180);doc.text(lead.website.replace(/^https?:\/\//,'').slice(0,24),cX.web,y);}
      else{doc.setTextColor(180,40,40);doc.text('No Website',cX.web,y);}
      doc.setTextColor(60,150,60);
      doc.text(lead.rating?(lead.rating+" ("+lead.reviews+")"): "-",cX.rate,y);
      const sc=lead.scoreLabel;
      doc.setFont('helvetica','bold');
      if(sc==='Hot')doc.setTextColor(200,30,30);
      else if(sc==='Warm')doc.setTextColor(200,100,0);
      else if(sc==='Cold')doc.setTextColor(30,80,200);
      else doc.setTextColor(100,100,100);
      doc.text(sc?sc:"-",cX.sc,y);
      y+=5;
      doc.setFont('helvetica','normal');doc.setFontSize(6);doc.setTextColor(100,120,140);
      doc.text(lead.address.slice(0,90),cX.name,y);
      y+=2;doc.setDrawColor(220,228,240);doc.line(M-2,y,W-M+2,y);y+=4;
    });

    const pg=doc.internal.getNumberOfPages();
    for(let i=1;i<=pg;i++){
      doc.setPage(i);doc.setFillColor(240,244,250);doc.rect(0,287,W,10,'F');
      doc.setFont('helvetica','normal');doc.setFontSize(6);doc.setTextColor(80,100,130);
      doc.text("LeadStream Pro by Skill Up TechBuzz  -  "+now+"  -  Page "+i+" of "+pg,M,293);
    }
    doc.save("leads_"+type+"_"+city+"_"+Date.now()+".pdf");
  }catch(e){alert("PDF error: "+e.message);}
  btn.disabled=false;btn.textContent="EXPORT PDF";
}

  const el=document.getElementById('errMsg');
  el.textContent="Warning: "+msg;el.style.display="block";
}

// Build flat search index
const CITY_INDEX = [];
INDIA_CITIES.forEach(c=>{
  CITY_INDEX.push({display:c.n, sub:`${c.s}`, city:c.n, areas:c.areas});
});

let cityDropIdx = -1;
let selectedAreas = null;

function filterCities(val){
  val = val.trim().toLowerCase();
  const drop = document.getElementById('cityDrop');
  if(!val){drop.classList.remove('open');selectedAreas=null;return;}
  const matches = CITY_INDEX.filter(c=>
    c.display.toLowerCase().startsWith(val) ||
    c.display.toLowerCase().includes(val)
  ).slice(0,10);
  if(!matches.length){drop.classList.remove('open');return;}
  drop.innerHTML = matches.map((c,i)=>
    `<div class="city-item" data-idx="${i}" data-city="${c.display}" data-areas='${JSON.stringify(c.areas)}' onmousedown="selectCity('${c.display}',this)">
      ${c.display} <span class="city-state">${c.sub}</span>
    </div>`
  ).join('');
  cityDropIdx = -1;
  drop.classList.add('open');
}

function showCityDrop(val){
  if(val.trim()) filterCities(val);
}

function hideCityDrop(){
  setTimeout(()=>{
    document.getElementById('cityDrop').classList.remove('open');
  },200);
}

function selectCity(cityName, el){
  document.getElementById('cityInput').value = cityName;
  const areas = JSON.parse(el.getAttribute('data-areas'));
  selectedAreas = areas;
  document.getElementById('cityDrop').classList.remove('open');
}

function cityKeyNav(e){
  const drop = document.getElementById('cityDrop');
  const items = drop.querySelectorAll('.city-item');
  if(e.key==='ArrowDown'){
    e.preventDefault();
    cityDropIdx = Math.min(cityDropIdx+1, items.length-1);
    items.forEach((it,i)=>it.classList.toggle('active',i===cityDropIdx));
  } else if(e.key==='ArrowUp'){
    e.preventDefault();
    cityDropIdx = Math.max(cityDropIdx-1, 0);
    items.forEach((it,i)=>it.classList.toggle('active',i===cityDropIdx));
  } else if(e.key==='Enter'){
    e.preventDefault();
    if(cityDropIdx>=0 && items[cityDropIdx]){
      selectCity(items[cityDropIdx].getAttribute('data-city'), items[cityDropIdx]);
    } else {
      searchBusinesses();
    }
  } else if(e.key==='Escape'){
    drop.classList.remove('open');
  }
}

// Capture lead card as image and prepare for sharing
async function captureAndShare(cardId, buttonEl) {
  const cardElement = document.getElementById(`card-${cardId}`);
  if (!cardElement) return;
  
  const lead = leads.find(l => l.id === cardId);
  if (!lead) return;
  
  buttonEl.disabled = true;
  buttonEl.textContent = '⏳ Capturing...';
  
  try {
    if (!window.html2canvas) {
      const script = document.createElement('script');
      script.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
      script.onload = () => performCapture(cardId, cardElement, buttonEl, lead);
      document.head.appendChild(script);
    } else {
      performCapture(cardId, cardElement, buttonEl, lead);
    }
  } catch (error) {
    console.error('Capture error:', error);
    buttonEl.disabled = false;
    buttonEl.textContent = '📸 Image';
    alert('Error capturing image. Try again.');
  }
}

function performCapture(cardId, cardElement, buttonEl, lead) {
  // Build a bright, clean off-screen card (no buttons) for capture
  const captureDiv = document.createElement('div');
  captureDiv.style.cssText = `
    position:fixed; left:-9999px; top:0;
    width:480px; padding:24px 28px 28px 28px;
    background:linear-gradient(135deg,#0d1b2a,#112240);
    border-radius:20px; border:2px solid #f97316;
    box-shadow:0 0 40px rgba(249,115,22,0.25);
    font-family:'Inter',sans-serif; box-sizing:border-box;
  `;

  // Avatar color based on id
  const hue = (cardId * 53) % 360;
  const avatarBg = `hsl(${hue},70%,35%)`;
  const avatarFg = `hsl(${hue},90%,80%)`;
  const initials = (lead.name || 'XX').slice(0,2).toUpperCase();

  // Rating badge
  const ratingHtml = lead.rating
    ? `<div style="display:inline-flex;align-items:center;gap:6px;background:linear-gradient(135deg,#ffd700,#ff9500);border-radius:30px;padding:6px 14px;font-size:13px;font-weight:800;color:#1a1000;margin-bottom:8px;">
        ⭐ ${lead.rating.toFixed(1)} &nbsp;•&nbsp; ${lead.reviews}+ reviews
       </div>` : '';

  // No website badge
  const noWebHtml = !lead.website
    ? `<div style="display:inline-flex;align-items:center;gap:5px;background:rgba(255,60,60,0.18);border:1.5px solid #ff4444;border-radius:20px;padding:4px 12px;font-size:11px;font-weight:700;color:#ff7777;margin-left:8px;">✗ No Website</div>`
    : '';

  // Phone color
  const phoneColor = lead.phone && lead.phone !== 'Not listed' ? '#00e5ff' : '#ff9900';

  captureDiv.innerHTML = `
    <div style="display:flex;align-items:center;gap:14px;margin-bottom:18px;">
      <div style="width:52px;height:52px;border-radius:50%;background:${avatarBg};color:${avatarFg};display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:800;flex-shrink:0;border:2px solid ${avatarFg}44;">${initials}</div>
      <div style="flex:1;">
        <div style="font-size:17px;font-weight:800;color:#ffffff;line-height:1.25;letter-spacing:-0.01em;">${lead.name}</div>
        <div style="font-size:11px;color:#7ec8e3;margin-top:3px;font-weight:600;letter-spacing:0.04em;">${lead.category || 'Business'}</div>
      </div>
    </div>
    <div style="margin-bottom:14px;">
      ${ratingHtml}${noWebHtml}
    </div>
    <div style="background:rgba(255,255,255,0.06);border-radius:12px;padding:14px 16px;margin-bottom:12px;">
      <div style="font-size:12px;color:#a0b4c8;margin-bottom:8px;font-weight:600;letter-spacing:0.06em;">📍 ADDRESS</div>
      <div style="font-size:13px;color:#dce8f4;line-height:1.6;font-weight:500;">${lead.address}</div>
    </div>
    <div style="background:rgba(249,115,22,0.08);border:1.5px solid rgba(249,115,22,0.3);border-radius:12px;padding:12px 16px;display:flex;align-items:center;gap:10px;">
      <span style="font-size:18px;">📞</span>
      <span style="font-size:15px;font-weight:800;color:${phoneColor};letter-spacing:0.02em;">${lead.phone}</span>
    </div>
    <div style="margin-top:16px;text-align:right;font-size:9px;color:#3a5068;font-family:'Space Mono',monospace;letter-spacing:0.1em;">LEADSTREAM PRO • SKILL UP TECHBUZZ</div>
  `;

  document.body.appendChild(captureDiv);

  html2canvas(captureDiv, {
    backgroundColor: null,
    scale: 2.5,
    logging: false,
    useCORS: true,
    allowTaint: true,
    width: 480,
    windowWidth: 480
  }).then(canvas => {
    document.body.removeChild(captureDiv);
    canvas.toBlob(blob => {
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = `lead-${lead.name.replace(/\s+/g,'-')}-${Date.now()}.png`;

      function buildWAUrl(leadData) {

Check us out: https://skilluptechbuzz.in/#contact\n\nAre you interested? 😊`;

      URL.revokeObjectURL(url);
    }, 'image/png');
  }).catch(error => {
    document.body.removeChild(captureDiv);
    console.error('Canvas error:', error);
    buttonEl.disabled = false;
